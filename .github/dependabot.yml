version: 2
updates:
  # GitHub Actions
  # Single entry per (ecosystem, directory) — Dependabot rejects two entries that
  # share `directory: "/"` for the same ecosystem ("overlapping directories"),
  # which silently skips the whole github-actions ecosystem. The ci-actions group
  # limits itself to minor/patch, so major bumps there surface as individual PRs.
  # The security-actions group intentionally has NO update-types filter: it covers
  # github/codeql-action, whose init/analyze/upload-sarif sub-actions are versioned
  # together and MUST bump in one PR. A digest or major bump that escaped the group
  # would open per-sub-action PRs and desync the codeql-action versions, breaking
  # CodeQL ("Loaded a configuration file for version 'X', but running version 'Y'").
  #
  # Conditional handling lives in .github/workflows/dependabot-auto-merge.yml, not
  # here: entry-level labels can't be conditional, so that workflow reads the real
  # update-type via dependabot/fetch-metadata and applies deps:major +
  # status:needs-review to majors. github-actions updates are never auto-merged
  # (GITHUB_TOKEN can't modify workflow files), so no `automerge` label is set here.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    groups:
      # Security-related actions - prioritize these
      security-actions:
        patterns:
          - "ossf/*"
          - "github/codeql-action*"
          - "step-security/*"
          - "gitleaks/*"
        # No update-types filter: all update types (including digest and major) stay
        # grouped so codeql-action sub-actions always bump together in a single PR.
      # CI/CD actions
      ci-actions:
        patterns:
          - "actions/*"
          - "dorny/*"
          - "codecov/*"
          - "EndBug/*"
          - "dependabot/*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "deps:all"
      - "deps:github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
