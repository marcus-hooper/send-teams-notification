version: 2
updates:
  # GitHub Actions
  # Single entry per (ecosystem, directory) — Dependabot rejects two entries that
  # share `directory: "/"` for the same ecosystem ("overlapping directories"),
  # which silently skips the whole github-actions ecosystem. Minor/patch are
  # grouped below; major bumps don't match those groups (update-types limits each
  # group) so they surface as individual PRs.
  #
  # Conditional handling lives in .github/workflows/dependabot-auto-merge.yml, not
  # here: entry-level labels can't be conditional, so that workflow reads the real
  # update-type via dependabot/fetch-metadata and applies deps:major +
  # status:needs-review to majors. github-actions updates are never auto-merged
  # (GITHUB_TOKEN can't modify workflow files), so no `automerge` label is set here.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    groups:
      # Security-related actions - prioritize these
      security-actions:
        patterns:
          - "ossf/*"
          - "github/codeql-action"
          - "step-security/*"
          - "gitleaks/*"
        update-types:
          - "minor"
          - "patch"
      # CI/CD actions
      ci-actions:
        patterns:
          - "actions/*"
          - "dorny/*"
          - "codecov/*"
          - "EndBug/*"
          - "dependabot/*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "deps:all"
      - "deps:github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
